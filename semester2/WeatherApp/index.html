<body>
  <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link rel="stylesheet" href="./style.css">
 <script src="./script.js"></script>
  <body>
    <header>
      <div class="input-container">
        <input type="text" name="" id="input" placeholder="Enter Location" />
        <button id="search">Search</button>
      </div>
    </header>
    <main>
      <div class="weather-container">
        <div class="temperature">12.5&deg;</div>
        <div class="location-date">
          <div class="location"><h1>Delhi</h1></div>
          <span class="time">12:50</span>
          <span class="day">Friday</span>
          <span class="date">26-01-30</span>
        </div>
        <div class="weather-status">
            <div class="icon">
                <img src="//cdn.weatherapi.com/weather/64x64/day/113.png" alt="weather-status-image"/>
            </div>
            <div class="condition">Sunny</div>
        </div>
      </div>
    </main>
    <script></script>
  </body>
</html>
